<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greg - 质量工程师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .title {
            color: #667eea;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .info {
            color: #666;
            font-size: 14px;
            line-height: 2;
        }
        .info span {
            color: #333;
            font-weight: 500;
        }
        .links {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link {
            display: inline-block;
            padding: 10px 20px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .link:hover {
            background: #667eea;
            color: white;
        }
        footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">G</div>
        <h1>Greg</h1>
        <div class="title">质量工程师 Quality Engineer</div>
        
        <div class="info">
            <p>📍 <span>苏州</span></p>
            <p>🏢 <span>汽车零部件制造</span></p>
            <p>📧 <span>312415283@qq.com</span></p>
        </div>
        
        <div class="links">
            <a href="mailto:312415283@qq.com" class="link">联系我</a>
            <a href="#" class="link">项目经验</a>
            <a href="#" class="link">工作经历</a>
        </div>
        
        <footer>
            © 2026 Greg. All rights reserved.
        </footer>
    </div>
</body>
</html>
